<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact Map Analyzer - Visual Demo</title>
    <!-- Tailwind CSS for layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vis-Network for Graph -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 h-screen font-sans flex flex-col">
    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold">Impact Map Analyzer</h1>
            <p class="text-sm opacity-80">바이브 코딩을 위한 아키텍처 의존성 시각화 및 영향도 검증</p>
        </div>
        <div>
            <button id="simulateBtn" class="bg-red-500 hover:bg-red-400 text-white px-4 py-2 rounded shadow transition font-semibold">
                예제 시뮬레이션 (auth.py)
            </button>
            <button id="resetBtn" class="bg-white text-indigo-600 hover:bg-gray-200 px-4 py-2 rounded shadow transition font-semibold ml-2">
                초기화
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        <!-- Left: Graph Visualization -->
        <section class="w-2/3 h-full border-r border-gray-300 relative bg-white">
            <div id="mynetwork" class="w-full h-full"></div>
            
            <div class="absolute bottom-4 left-4 bg-white/90 p-3 rounded shadow pointer-events-none border border-gray-200">
                <h3 class="font-bold text-sm mb-2 text-gray-700">범례 (Legend)</h3>
                <div class="flex items-center mb-1">
                    <span class="w-3 h-3 rounded-full bg-blue-500 mr-2 border border-blue-700"></span>
                    <span class="text-xs">기본 모듈 (Safe)</span>
                </div>
                <div class="flex items-center mb-1">
                    <span class="w-3 h-3 rounded-full bg-red-600 mr-2 border border-red-800"></span>
                    <span class="text-xs font-semibold text-red-600">수정 대상 (Target)</span>
                </div>
                <div class="flex items-center mb-1">
                    <span class="w-3 h-3 rounded-full bg-orange-400 mr-2 border border-orange-600"></span>
                    <span class="text-xs font-semibold text-orange-600">직접 영향 (Direct)</span>
                </div>
                <div class="flex items-center">
                    <span class="w-3 h-3 rounded-full bg-yellow-400 mr-2 border border-yellow-600"></span>
                    <span class="text-xs font-semibold text-yellow-600">간접 영향 (Indirect)</span>
                </div>
            </div>
        </section>

        <!-- Right: Control & Reports -->
        <section class="w-1/3 h-full bg-gray-50 flex flex-col p-4 shadow-inner">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Impact Report</h2>
            
            <div id="statusPanel" class="bg-white rounded p-4 border-l-4 border-blue-500 shadow-sm mb-4">
                <p class="text-sm text-gray-600 font-semibold mb-1">현재 상태:</p>
                <div id="statusText" class="text-lg font-bold text-blue-600">아키텍처 스캔 대기 중</div>
            </div>

            <div id="reportContainer" class="flex-1 bg-white border border-gray-200 rounded p-4 overflow-y-auto hidden text-sm font-mono whitespace-pre-wrap shadow-sm">
                <!-- Report will be injected here -->
            </div>
            
            <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-gray-400">
                <svg class="w-16 h-16 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <p>그래프에서 노드를 클릭하거나, 상단 버튼을 눌러 영향도를 확인하세요.</p>
            </div>
        </section>
    </main>

    <!-- Script that powers the visualization -->
    <script src="script.js"></script>
</body>
</html>
